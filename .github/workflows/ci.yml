name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore DiscordBot/DiscordBot.csproj

      - name: Build
        run: dotnet build DiscordBot/DiscordBot.csproj --no-restore

      - name: Publish
        run: dotnet publish DiscordBot/DiscordBot.csproj -c Release -o out
